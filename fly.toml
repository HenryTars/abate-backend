app = 'abate-api'
primary_region = 'jnb'

[build]

[env]
PORT = "8080"

[[mounts]]
source = 'abate_storage'
destination = '/var/www/html/storage/app/public'

[http_service]
internal_port = 8080
force_https = true
auto_stop_machines = 'stop'
auto_start_machines = true
min_machines_running = 0

[[vm]]
memory = '256mb'
cpu_kind = 'shared'
cpus = 1
